apiVersion: openchoreo.dev/v1alpha1
kind: Trait
metadata:
  name: api-configuration
  namespace: default
spec:
  schema:
    parameters:
      # Developer-facing parameters - static across environments
      apiName: "string"
      apiVersion: "string | default=v1.0"
      context: "string" # API context path (e.g., /greeter-api, /checkout-service)
      upstreamPort: "integer | default=80" # Port on the service to route to
      upstreamBasePath: "string | default=/" # Base path on the upstream service
      operations:
        'array<map<string>> | default=[{"method": "GET", "path": "/*"}, {"method": "POST", "path": "/*"}, {"method": "PUT", "path": "/*"}, {"method": "DELETE", "path": "/*"}, {"method": "PATCH", "path": "/*"}, {"method": "OPTIONS", "path": "/*"}]'
        # Array of API operations
        # Example:
        # - method: GET
        #   path: /*
        # - method: POST
        #   path: /orders
      policies:
        "array<map<string>> | default=[]"
        # Array of policies to apply
        # Example:
        # - name: jwt-auth
        #   version: v0.1.0
        #   params:
        #     issuers:
        #       - thunder

  creates:
    # --- Backend: kgateway static backend pointing to WSO2 API Platform router ---
    # This Backend resource tells kgateway to forward traffic to the WSO2 API Platform
    # router instead of directly to the component's Service. The HTTPRoute's backendRef
    # is patched (below) to reference this Backend.
    - template:
        apiVersion: gateway.kgateway.dev/v1alpha1
        kind: Backend
        metadata:
          name: ${metadata.componentName}-api-gw-backend
          namespace: ${metadata.namespace}
        spec:
          type: Static
          static:
            hosts:
              - host: obs-gateway-gateway-router.openchoreo-data-plane
                port: 22893

    # Create RestApi resource (auto-discovered by gateway via apiSelector scope: Cluster)
    - template:
        apiVersion: gateway.api-platform.wso2.com/v1alpha1
        kind: RestApi
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
        spec:
          displayName: ${parameters.apiName}
          version: ${parameters.apiVersion}
          context: ${parameters.context}
          upstream:
            main:
              url: http://${metadata.componentName}.${metadata.namespace}:${parameters.upstreamPort}${parameters.upstreamBasePath}
          policies: ${parameters.policies}
          operations: ${parameters.operations}

  patches:
    # --- Patch HTTPRoute: Replace backendRef with WSO2 router Backend ---
    # Replaces the component's Service in the HTTPRoute backendRef with the kgateway
    # Backend pointing to the WSO2 API Platform router. This redirects all traffic
    # through the WSO2 router for policy enforcement before reaching the upstream service.
    #
    # The selector matches the backendRef by the component's Service name, ensuring
    # only the correct backendRef is replaced (not other refs in multi-backend routes).
    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
      operations:
        - op: replace
          path: /spec/rules/0/backendRefs/[?(@.name=='${metadata.componentName}')]
          value:
            group: gateway.kgateway.dev
            kind: Backend
            name: ${metadata.componentName}-api-gw-backend
            port: ${parameters.upstreamPort}

    # --- Patch HTTPRoute: Update URL rewrite to derived API context path ---
    # Sets the replacePrefixMatch to /<environment>-<namespace>-<componentName>,
    # matching the RestApi context so the WSO2 router can route correctly.
        - op: replace
          path: /spec/rules/0/filters/0/urlRewrite/path
          value:
            type: ReplacePrefixMatch
            replacePrefixMatch: /${parameters.context}
